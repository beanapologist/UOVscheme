name: Lean

on:
  push:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'

jobs:
  build:
    name: Lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      # Cache the Mathlib build artifacts — keyed on the exact Mathlib commit
      # embedded in the lake manifest so a bump auto-invalidates the cache.
      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Fetch dependencies
        run: lake exe cache get || lake update

      - name: Build library
        run: lake build UOVscheme

      - name: Build tests
        run: lake build Test

      - name: Check for sorry
        run: |
          # Fail if any non-axiom sorry slips in (axioms are whitelisted below)
          if grep -rn "sorry" UOVscheme/ --include="*.lean" \
               | grep -v "^Binary file" \
               | grep -v "MQ_hardness_assumption" \
               | grep -v "uov_reduces_to_mq" \
               | grep -v "PPT" \
               | grep -v "MQ\.hard" \
               | grep -v "UOV\.advantage" \
               | grep -v "axiom\|#check\|--"; then
            echo "Unexpected sorry found — see above." >&2
            exit 1
          fi
          echo "No unexpected sorry found."
