name: Lean

on:
  push:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'

jobs:
  # Fast check that requires no Lean installation — always runs.
  sorry-check:
    name: No sorry check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sorry
        run: |
          # Match `sorry` used as a Lean tactic or term (not the word in prose).
          if grep -rEn "(^|[[:space:]]|:=)[[:space:]]*sorry[[:space:]]*($|--)" \
               UOVscheme/ --include="*.lean" \
               | grep -v "^Binary file" \
               | grep -v "MQ_hardness_assumption\|uov_reduces_to_mq\|PPT\|MQ\.hard\|UOV\.advantage"; then
            echo "Unexpected sorry found — see above." >&2
            exit 1
          fi
          echo "No unexpected sorry found."

  # Full Lake build — downloads Lean 4.10.0 directly (bypasses elan CDN).
  build:
    name: Lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Lean + Lake artifacts
        uses: actions/cache@v4
        with:
          path: |
            /opt/lean4
            .lake/packages
            .lake/build
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Install Lean 4.10.0
        run: |
          set -euo pipefail
          if [ -x /opt/lean4/bin/lean ]; then
            echo "Lean already cached."
          else
            echo "Downloading Lean 4.10.0..."
            curl -fSL \
              https://github.com/leanprover/lean4/releases/download/v4.10.0/lean-4.10.0-linux.tar.zst \
              -o /tmp/lean.tar.zst
            sudo mkdir -p /opt/lean4
            sudo chown "$USER" /opt/lean4
            cd /opt/lean4
            zstd -d /tmp/lean.tar.zst --stdout | tar -x --strip-components=1
            rm /tmp/lean.tar.zst
          fi
          echo "/opt/lean4/bin" >> "$GITHUB_PATH"
          /opt/lean4/bin/lean --version
          /opt/lean4/bin/lake --version

      - name: Update dependencies
        run: lake update

      - name: Fetch Mathlib build cache
        run: lake exe cache get || echo "Cache fetch failed — will build from source"

      - name: Build library
        run: lake build UOVscheme

      - name: Build tests
        run: lake build Test
