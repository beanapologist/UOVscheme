name: Lean

on:
  push:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'

jobs:
  build:
    name: Lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- --default-toolchain none -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Install Lean toolchain
        run: |
          set -euo pipefail
          TOOLCHAIN=$(cat lean-toolchain)
          echo "Installing toolchain: $TOOLCHAIN"
          elan toolchain install "$TOOLCHAIN"
          elan override set "$TOOLCHAIN"
          lean --version
          lake --version

      - name: Update dependencies
        run: lake update

      - name: Fetch Mathlib build cache
        run: lake exe cache get || echo "Cache fetch failed — will build from source"

      - name: Build library
        run: lake build UOVscheme

      - name: Build tests
        run: lake build Test

      - name: Check for sorry
        run: |
          if grep -rEn "(^|[[:space:]]|:=)[[:space:]]*sorry[[:space:]]*($|--)" \
               UOVscheme/ --include="*.lean" \
               | grep -v "^Binary file" \
               | grep -v "MQ_hardness_assumption\|uov_reduces_to_mq\|PPT\|MQ\.hard\|UOV\.advantage"; then
            echo "Unexpected sorry found — see above." >&2
            exit 1
          fi
          echo "No unexpected sorry found."
