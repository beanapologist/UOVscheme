name: Lean

on:
  push:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'UOVscheme/**'
      - 'Test/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'

jobs:
  build:
    name: Lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      # Cache the Mathlib build artifacts — keyed on the exact Mathlib commit
      # embedded in the lake manifest so a bump auto-invalidates the cache.
      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            lean-${{ runner.os }}-

      # lake update must run first so that the Mathlib `cache` executable
      # exists before we try to call `lake exe cache get`.
      - name: Update dependencies
        run: lake update

      - name: Fetch Mathlib build cache
        run: lake exe cache get || echo "Cache fetch failed — will build from source"

      - name: Build library
        run: lake build UOVscheme

      - name: Build tests
        run: lake build Test

      - name: Check for sorry
        run: |
          # Match `sorry` used as a Lean tactic or term (not the word in prose).
          # Patterns caught: "by sorry", ":= sorry", "  sorry" alone on a line.
          # This avoids matching comments like "No sorry" or "sorry-free".
          if grep -rEn "(^|[[:space:]]|:=)[[:space:]]*sorry[[:space:]]*($|--)" \
               UOVscheme/ --include="*.lean" \
               | grep -v "^Binary file" \
               | grep -v "MQ_hardness_assumption\|uov_reduces_to_mq\|PPT\|MQ\.hard\|UOV\.advantage"; then
            echo "Unexpected sorry found — see above." >&2
            exit 1
          fi
          echo "No unexpected sorry found."
